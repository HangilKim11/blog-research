# Defaults for end-to-end fine-tune of a pretrained SSL encoder.
# Override `encoder.ckpt` to point at each pretrained checkpoint.

encoder:
  ckpt: checkpoints/nextstep-274fdf8c/encoder.pt   # default = best Phase 2 encoder

head:
  dropout: 0.1

data:
  tokenizer_path: data/processed/v1/tokenizer.json
  splits_path: data/splits/v1.parquet
  train_glob: data/processed/v1/train/**/*.parquet
  batch_size: 512
  # Few-shot study: set to a value in (0, 1) to fine-tune on a stratified subset
  # of the trainval labels (matched against amex.data.subset.stratified_trainval_subset).
  subset_fraction: 1.0
  subset_seed: 1234

optim:
  lr_head: 1.0e-3        # fresh head needs a normal lr
  lr_encoder: 1.0e-4     # pretrained encoder needs a small lr (10x smaller)
  weight_decay: 0.01
  grad_clip: 1.0

trainer:
  max_epochs: 8
  patience: 3
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  log_every_n_steps: 50
  # Fine-tune is fast: use a larger fraction per epoch than Phase 2 SSL.
  # IterableDataset requires int; 800 batches @ 512 ~= 410k samples ~= 1 full pass over train+val.
  limit_train_batches: 800
  steps_per_epoch_estimate: 800
  wandb: true
